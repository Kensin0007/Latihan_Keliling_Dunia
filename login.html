<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jelajah Dunia Bersama Kensin</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="page-wrapper">

    <!-- HEADER -->
    <header class="header">
        <h1>🌍 Jelajah Dunia Bersama Kensin</h1>

        <nav class="navbar">
            <ul>
                <li><a href="index.html">Beranda</a></li>
                <li><a href="paket.html">Paket Wisata</a></li>
                <li><a href="kontak.html">Kontak</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- LOGIN -->
    <section class="login-section">

        <div class="login-box">

            <h2>Login Akun</h2>
            <p>Silakan login sebelum melakukan pemesanan paket wisata.</p>

            <form action="#" method="GET">

                <label>Username</label>
                <input type="text" placeholder="Masukkan Username" required>

                <label>Email</label>
                <input type="email" placeholder="contoh@email.com" required>

                <label>Password</label>
                <input type="password" placeholder="Masukkan Password" required>

                <label class="remember">
                    <input type="checkbox">
                    Ingat Saya
                </label>

                <button type="submit">Masuk</button>

            </form>

        </div>

    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 Jelajah Dunia Bersama Kensin</p>
    </footer>

</div>

</body>
</html>
